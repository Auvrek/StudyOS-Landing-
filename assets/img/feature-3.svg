<svg viewBox="0 0 280 200" fill="none" xmlns="http://www.w3.org/2000/svg" width="280" height="200">
  <!-- Flashcards / Quiz illustration -->
  <rect x="20" y="20" width="240" height="160" rx="12" fill="#F2F3F5"/>
  <!-- Back card -->
  <rect x="55" y="48" width="170" height="110" rx="8" fill="#ECEAF8" transform="rotate(-4 55 48)"/>
  <!-- Mid card -->
  <rect x="60" y="44" width="170" height="110" rx="8" fill="#DCDFE3" transform="rotate(-1 60 44)"/>
  <!-- Front card -->
  <rect x="55" y="40" width="170" height="110" rx="8" fill="white" stroke="#9B8FD4" stroke-width="1.5"/>
  <!-- Question mark / flashcard content -->
  <rect x="70" y="56" width="140" height="8" rx="4" fill="#DCDFE3"/>
  <rect x="70" y="70" width="110" height="8" rx="4" fill="#DCDFE3"/>
  <!-- Divider -->
  <line x1="70" y1="88" x2="210" y2="88" stroke="#E8EAED" stroke-width="1.5"/>
  <!-- Answer area with check -->
  <circle cx="95" cy="110" r="14" fill="#ECEAF8"/>
  <path d="M89 110l4 4 8-8" stroke="#9B8FD4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="118" y="104" width="72" height="6" rx="3" fill="#DCDFE3"/>
  <rect x="118" y="115" width="55" height="6" rx="3" fill="#DCDFE3"/>
  <!-- Progress dots -->
  <circle cx="115" cy="165" r="4" fill="#9B8FD4"/>
  <circle cx="128" cy="165" r="4" fill="#9B8FD4" opacity="0.4"/>
  <circle cx="141" cy="165" r="4" fill="#9B8FD4" opacity="0.4"/>
  <circle cx="154" cy="165" r="4" fill="#9B8FD4" opacity="0.4"/>
  <circle cx="167" cy="165" r="4" fill="#9B8FD4" opacity="0.4"/>
  <!-- Star -->
  <circle cx="232" cy="45" r="5" fill="#C5A24A" opacity="0.4"/>
  <circle cx="48" cy="168" r="3" fill="#C5A24A" opacity="0.3"/>
</svg>
